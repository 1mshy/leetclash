# LeetClash — dev infrastructure (PLAN.md §7, dev table)
#
# Usage:  docker compose -f infra/docker-compose.yml up -d
#
# NOTE (Phase 0): the app services (web / api / realtime) are NOT containerized
# yet — run them on the host with `pnpm dev`. They reach these services on
# localhost via the published ports (see ../.env.example).

name: leetclash

networks:
  default:
    # web/api/realtime (host) + postgres/redis/minio + judge0-server (API only)
  judge:
    # Isolated network for the Judge0 quartet. Only judge0-server also joins
    # `default` so the api can reach it on localhost:2358.

volumes:
  postgres-data:
  minio-data:
  judge0-db-data:
  judge-cache:

services:
  # ── Core app dependencies ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leetclash
      POSTGRES_PASSWORD: leetclash
      POSTGRES_DB: leetclash
    ports:
      # Published on 5433, not 5432: a Homebrew postgres@17 on the dev host
      # binds ::1:5432 and shadows this container for `localhost` connections
      # (localhost resolves to ::1 first). 5433 keeps the app's DB unambiguous.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leetclash -d leetclash"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: leetclash
      MINIO_ROOT_PASSWORD: leetclash-secret
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: create the buckets the app expects, then exit.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 leetclash leetclash-secret &&
        mc mb --ignore-existing local/testdata &&
        mc mb --ignore-existing local/submissions &&
        echo 'buckets ready'
      "

  # ── Judge0 quartet (MVP judge, PLAN.md §4.1) ─────────────────────────────
  judge0-server:
    image: judge0/judge0:1.13.1
    env_file: judge0.env
    ports:
      - "2358:2358"
    networks:
      - default # so the api (host) can reach it at localhost:2358
      - judge
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:2358/system_info > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  judge0-worker:
    image: judge0/judge0:1.13.1
    command: ["./scripts/workers"]
    env_file: judge0.env
    privileged: true # required by Judge0's isolate sandbox
    networks:
      - judge
    deploy:
      replicas: 2
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    restart: unless-stopped

  judge0-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: judge0
      POSTGRES_PASSWORD: judge0-dev-password
      POSTGRES_DB: judge0
    networks:
      - judge
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge0 -d judge0"]
      interval: 5s
      timeout: 3s
      retries: 10

  judge0-redis:
    image: redis:7-alpine
    # Password must match REDIS_PASSWORD in judge0.env (Judge0 always AUTHs).
    command: ["redis-server", "--requirepass", "judge0-dev-password"]
    networks:
      - judge
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "judge0-dev-password", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Phase 3: custom isolate judge (profile "judge-v2", PLAN §4.1) ────────
  # Replaces the judge0 quartet: set JUDGE_BACKEND=isolate on the api/worker
  # and start with  docker compose --profile judge-v2 up -d --build
  # Scale on queue depth via infra/scripts/judge-autoscale.sh (§9 Phase 3).
  judge-worker:
    build:
      context: ..
      dockerfile: apps/judge/Dockerfile
    profiles: ["judge-v2"]
    # isolate needs namespace + cgroup control; private cgroupns gives the
    # container its own delegatable cgroup v2 subtree (see entrypoint.sh).
    privileged: true
    cgroup: private
    environment:
      REDIS_URL: redis://redis:6379
      JUDGE_LANGUAGES: python,cpp
      JUDGE_POOL_SIZE: 4
      # "on" = exit loudly when cgroup delegation breaks (Memory Golf needs
      # cgroup memory.peak, §4.4); switch to auto to tolerate an rss fallback.
      # Quoted — bare `on` is a YAML 1.1 boolean and would reach zod as "true".
      JUDGE_CGROUPS: "on"
    volumes:
      - judge-cache:/var/cache/leetclash-judge
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4200/healthz').then(r=>process.exit(r.ok?0:1),()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  # ── Optional: reverse proxy (profile "proxy") ────────────────────────────
  traefik:
    image: traefik:v3
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "8080:8080" # dashboard (insecure, dev only)
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ── Optional: observability (profile "observability") ───────────────────
  prometheus:
    image: prom/prometheus
    profiles: ["observability"]
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway" # scrape api/realtime on the host

  grafana:
    image: grafana/grafana
    profiles: ["observability"]
    ports:
      - "3001:3000" # 3000 is taken by the Next.js dev server on the host
    environment:
      GF_SECURITY_ADMIN_USER: leetclash
      GF_SECURITY_ADMIN_PASSWORD: leetclash

  loki:
    image: grafana/loki
    profiles: ["observability"]
    ports:
      - "3100:3100"
